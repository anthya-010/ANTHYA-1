
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question for You</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a5acd,#a855f7,#ff6ec7);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:white;
    padding:45px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff3c78;
}

button{
    padding:12px 25px;
    margin:12px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#ff6fa5;
    color:white;
    transition:0.25s;
}

button:hover{
    transform:scale(1.07);
}

#message{
    display:none;
    font-size:22px;
    margin-top:20px;
    color:#ff3c78;
}

#timelineBtn{
    display:none;
}

#secondQuestion{
    display:none;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Do you like the person who made this website (fyi Nithu Papa made this!)? 😌</h1>

<button id="yesBtn">Yes</button>
<button id="loveBtn">I love you!</button>

<div id="secondQuestion">
<button id="angryBtn">Only yes! Are you angry on me? 😢</button>
</div>

<div id="message">
❤️ Love you too! ❤️
</div>

<button id="timelineBtn">Want to see our timeline? 💜</button>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const loveBtn = document.getElementById("loveBtn");
const angryBtn = document.getElementById("angryBtn");

const secondQuestion = document.getElementById("secondQuestion");
const message = document.getElementById("message");
const timelineBtn = document.getElementById("timelineBtn");

yesBtn.onclick = () => {
    secondQuestion.style.display="block";
};

loveBtn.onclick = () => {
    message.style.display="block";
    timelineBtn.style.display="inline-block";
};

angryBtn.onclick = () => {
    window.location.href="page2.html";
};

timelineBtn.onclick = () => {
    window.location.href="timeline.html";
};

</script>

</body>
</html>
